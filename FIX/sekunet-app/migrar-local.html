<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Migrar localStorage → Supabase</title>
<style>
  body { font-family: monospace; background: #0f172a; color: #e2e8f0; padding: 30px; }
  button { padding: 12px 24px; background: #1d4ed8; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 15px; margin: 8px; }
  button:hover { background: #2563eb; }
  pre { background: #1e293b; padding: 16px; border-radius: 8px; font-size: 12px; overflow: auto; max-height: 300px; }
  .ok  { color: #4ade80; }
  .err { color: #f87171; }
  .info{ color: #93c5fd; }
  input { width: 100%; padding: 10px; background: #1e293b; border: 1px solid #334155; border-radius: 6px; color: #fff; font-size: 13px; margin: 6px 0 12px; }
  label { color: #94a3b8; font-size: 12px; }
</style>
</head>
<body>
<h2>🔄 Migrar historial local → Supabase</h2>
<p class="info">Esto leerá los casos de <b>localStorage</b> y guardará el historial en Supabase.</p>

<label>URL de Supabase</label>
<input id="sbUrl" placeholder="https://xxx.supabase.co" />
<label>Anon Key</label>
<input id="sbKey" placeholder="eyJ..." />
<label>Access Token (copialo de la consola: sb.auth.getSession())</label>
<input id="token" placeholder="eyJ..." />

<br>
<button onclick="analizar()">1. Analizar localStorage</button>
<button onclick="migrar()">2. Migrar a Supabase</button>
<pre id="log">Esperando...</pre>

<script>
function log(msg, cls='') {
  const pre = document.getElementById('log');
  pre.innerHTML += `<span class="${cls}">${msg}</span>\n`;
  pre.scrollTop = pre.scrollHeight;
}

function analizar() {
  document.getElementById('log').innerHTML = '';
  const casos = JSON.parse(localStorage.getItem('sek_cases') || '[]');
  log(`📦 Casos en localStorage: ${casos.length}`, 'info');
  casos.forEach(c => {
    const hc = (c.histcliente || c.histCliente || []).length;
    const ht = (c.histtecnico || c.histTecnico || []).length;
    log(`  • ${c.title?.substring(0,40)} | cliente:${hc} msgs | técnico:${ht} msgs`, hc+ht > 0 ? 'ok' : 'err');
  });
}

async function migrar() {
  const url   = document.getElementById('sbUrl').value.trim();
  const key   = document.getElementById('sbKey').value.trim();
  const token = document.getElementById('token').value.trim();

  if (!url || !key || !token) {
    log('⚠️ Completa URL, Key y Token primero', 'err');
    return;
  }

  const casos = JSON.parse(localStorage.getItem('sek_cases') || '[]');
  log(`\n🚀 Migrando ${casos.length} casos...`, 'info');

  let ok = 0, skip = 0, err = 0;
  for (const c of casos) {
    const hc = c.histcliente || c.histCliente || [];
    const ht = c.histtecnico || c.histTecnico || [];
    if (hc.length === 0 && ht.length === 0) {
      log(`  ⏭ ${c.title?.substring(0,35)} — sin historial, omitido`, 'info');
      skip++;
      continue;
    }
    try {
      const res = await fetch(`${url}/rest/v1/sek_cases?id=eq.${c.id}`, {
        method: 'PATCH',
        headers: {
          'Content-Type' : 'application/json',
          'apikey'       : key,
          'Authorization': `Bearer ${token}`,
          'Prefer'       : 'return=minimal',
        },
        body: JSON.stringify({ histcliente: hc, histtecnico: ht }),
      });
      if (res.ok) {
        log(`  ✅ ${c.title?.substring(0,35)} — ${hc.length} msgs cliente, ${ht.length} msgs técnico`, 'ok');
        ok++;
      } else {
        const e = await res.text();
        log(`  ❌ ${c.title?.substring(0,35)} — ${res.status}: ${e}`, 'err');
        err++;
      }
    } catch(e) {
      log(`  ❌ Error: ${e.message}`, 'err');
      err++;
    }
  }
  log(`\n✅ Migrados: ${ok} | Omitidos: ${skip} | Errores: ${err}`, ok > 0 ? 'ok' : 'err');
}
</script>
</body>
</html>
